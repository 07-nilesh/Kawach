# Server binding for local network access
server.port=8080
server.address=0.0.0.0

# Netty & WebFlux optimizations for 8GB M1 Host
# Limit max in-memory payload size to prevent OOM errors during high concurrency
spring.codec.max-in-memory-size=512KB
# Restrict HTTP header sizes to minimize memory allocation per request
server.max-http-request-header-size=8KB
