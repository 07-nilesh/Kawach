<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinel-X</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white w-[400px] h-[500px] p-5 font-sans flex flex-col">

    <header class="border-b border-gray-700 pb-3 mb-5">
        <h1 class="text-2xl font-bold text-center text-blue-500 tracking-wide">Sentinel-X Shield</h1>
    </header>

    <main class="flex-grow flex flex-col gap-4">
        <button id="audit-btn"
            class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-4 rounded shadow-lg transition-colors duration-200">
            Audit Legal Text
        </button>

        <button id="scan-btn"
            class="w-full bg-purple-600 hover:bg-purple-500 text-white font-bold py-3 px-4 rounded shadow-lg transition-colors duration-200">
            Scan for Fraud
        </button>

        <div id="results-container"
            class="mt-4 flex-grow overflow-y-auto bg-gray-800 rounded p-4 text-sm text-gray-400 border border-gray-700">
            Awaiting systems check...
        </div>
    </main>
    <script src="popup.js"></script>
</body>

</html>
